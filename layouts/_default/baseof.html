<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  {{ partial "head.html" . }}
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body class="{{ if .IsHome }}home{{ end }}">
  <header class="site-header">
    <nav class="nav-container">
      <a href="{{ "/" | relURL }}" class="site-logo">{{ site.Title }}</a>
      <ul class="nav-menu">
        {{ range site.Menus.main }}
        <li><a href="{{ .URL | relURL }}" class="nav-link">{{ .Name }}</a></li>
        {{ end }}
      </ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </header>

  <main class="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ now.Year }} {{ site.Title }}</p>
  </footer>

  <script>
    (function() {
      const toggle = document.getElementById('theme-toggle');
      const html = document.documentElement;
      const stored = localStorage.getItem('theme');
      if (stored) {
        html.setAttribute('data-theme', stored);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        html.setAttribute('data-theme', 'dark');
      }
      toggle.addEventListener('click', () => {
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();
  </script>
</body>
</html>
