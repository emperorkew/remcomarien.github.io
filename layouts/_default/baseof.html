<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }} — Where molecules meet algorithms{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}Chemical engineer & software developer. I turn reactions into solutions.{{ end }}">
  {{ partial "head.html" . }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body class="{{ if .IsHome }}home{{ end }}">
  <!-- Scroll progress -->
  <div class="scroll-progress" id="scroll-progress"></div>

  <!-- Custom cursor -->
  <div class="custom-cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursor-trail"></div>

  <header class="site-header" id="header">
    <nav class="nav-container">
      <a href="{{ "" | relURL }}" class="site-logo">
        <span class="logo-hex">&lt;</span>RM<span class="logo-hex">/&gt;</span>
      </a>
      <ul class="nav-menu">
        {{ range site.Menus.main }}
        <li><a href="{{ .URL | relURL }}" class="nav-link magnetic" data-strength="20">{{ .Name }}</a></li>
        {{ end }}
      </ul>
      <button class="theme-toggle magnetic" id="theme-toggle" data-strength="30" aria-label="Toggle dark mode">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </header>

  <main class="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-molecule">
        <span>C</span><sub>8</sub><span>H</span><sub>10</sub><span>N</span><sub>4</sub><span>O</span><sub>2</sub>
        <span class="footer-plus">+</span>
        <span class="footer-code">&lt;code/&gt;</span>
        <span class="footer-eq">=</span>
        <span class="footer-result">this site</span>
      </div>
      <p>&copy; {{ now.Year }} Remco Marien. Built with curiosity and caffeine.</p>
    </div>
  </footer>

  {{ if .IsHome }}
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  {{ end }}
  <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
