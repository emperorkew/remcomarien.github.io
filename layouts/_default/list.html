{{ define "main" }}
<div class="page-content">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
  </header>
  <div class="content">
    {{ .Content }}
  </div>
  {{ $pages := .Pages }}
  {{ if $pages }}
  <ul class="post-list">
    {{ range $pages }}
    <li class="post-item">
      <a href="{{ .Permalink }}">
        <span class="post-title">{{ .Title }}</span>
        {{ with .Date }}<span class="post-date">{{ .Format "2 Jan 2006" }}</span>{{ end }}
      </a>
    </li>
    {{ end }}
  </ul>
  {{ end }}
</div>
{{ end }}
