    <line x1="0" y1="-95" x2="0" y2="-20" stroke="#a8a29e" stroke-width="2.5"/>
    <line x1="-30" y1="-20" x2="30" y2="-20" stroke="#a8a29e" stroke-width="3.5" stroke-linecap="round"/>
