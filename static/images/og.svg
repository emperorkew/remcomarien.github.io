  <rect x="155" y="400" width="55" height="28" rx="4" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <text x="182" y="419" font-family="monospace" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="600">PAT</text>
  <rect x="225" y="400" width="60" height="28" rx="4" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <text x="255" y="419" font-family="monospace" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="600">MPC</text>
  <rect x="300" y="400" width="35" height="28" rx="4" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.6"/>
  <text x="317" y="419" font-family="monospace" font-size="12" fill="#5eead4" text-anchor="middle" font-weight="600">C</text>
  <rect x="350" y="400" width="55" height="28" rx="4" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.6"/>
  <text x="377" y="419" font-family="monospace" font-size="12" fill="#5eead4" text-anchor="middle" font-weight="600">Rust</text>
  <rect x="420" y="400" width="75" height="28" rx="4" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.6"/>
  <text x="457" y="419" font-family="monospace" font-size="12" fill="#5eead4" text-anchor="middle" font-weight="600">Python</text>
  <!-- Mini reactor -->
  <g transform="translate(900, 200)" opacity="0.15">
    <rect x="-60" y="-80" width="120" height="180" rx="8" fill="none" stroke="#a8a29e" stroke-width="3"/>
