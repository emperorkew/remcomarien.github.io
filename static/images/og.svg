  <text x="80" y="360" font-family="monospace" font-size="24" fill="#5eead4" letter-spacing="1">Software &amp; Embedded Systems</text>
  <!-- Tags -->
  <rect x="80" y="400" width="60" height="28" rx="4" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
